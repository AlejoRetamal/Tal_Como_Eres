<app-navbar></app-navbar>

<div class="page">
  <div class="page-header">
    <a routerLink="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="m15 18-6-6 6-6"/>
      </svg>
      Volver
    </a>
    <h1 class="page-title">{{ categoria?.nombre }}</h1>
    <p class="page-count">{{ productos.length }} prendas</p>
  </div>

  <div class="productos-grid" *ngIf="productos.length > 0; else empty">
    <div class="producto-card" *ngFor="let p of productos" [routerLink]="['/producto', p.id]">
      <div class="producto-img">
        <img *ngIf="p.imagen" [src]="p.imagen" [alt]="p.nombre">
        <div *ngIf="!p.imagen" class="producto-img-placeholder">
          <span>TCE</span>
        </div>
        <span class="producto-categoria">{{ p.categoria }}</span>
      </div>
      <div class="producto-info">
        <p class="producto-nombre">{{ p.nombre }}</p>
        <p class="producto-descripcion">{{ p.descripcion }}</p>
        <p class="producto-precio">{{ formatPrecio(p.precio) }}</p>
      </div>
    </div>
  </div>

  <ng-template #empty>
    <div class="empty">
      <p>No hay prendas en esta categoría todavía.</p>
    </div>
  </ng-template>
</div>
